name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:          # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Download FFmpeg into assets/
        run: |
          python -m spotdl --download-ffmpeg
          copy "$env:USERPROFILE\.spotdl\ffmpeg.exe" "assets\ffmpeg.exe"
        shell: powershell

      - name: Ensure settings.json exists
        run: |
          if (!(Test-Path "settings.json")) {
            '{"client_id":"","client_secret":"","default_output_folder":""}' |
              Out-File -FilePath "settings.json" -Encoding utf8
          }
        shell: powershell

      - name: Build EXE
        run: pyinstaller spotrr.spec --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpotRR-Windows-x64
          path: dist/SpotRR.exe
          if-no-files-found: error
          retention-days: 90
